# Smart LMS chatbot stack: RAG (FastAPI), Ollama, Redis, MinIO
#
# From repo root (moodle500/):
#   docker compose -f local/chatbot/docker/docker-compose.yml --env-file local/chatbot/docker/.env up -d --build
#
# Moodle stays on the host (MAMP). Set plugin fastapiurl to http://127.0.0.1:8787

name: moodle-chatbot

services:
  rag:
    build:
      context: ../../..
      dockerfile: local/chatbot/docker/Dockerfile
    container_name: moodle-chatbot-rag
    restart: unless-stopped
    ports:
      - "${RAG_HOST_PORT:-8787}:8787"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      # MAMP MySQL: TCP via host.docker.internal often fails (root@localhost). Prefer socket mount below.
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_UNIX_SOCKET: ${MYSQL_UNIX_SOCKET:-/var/run/mysqld/mysqld.sock}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - rag_chroma:/app/local/chatbot/rag_service/chroma_db
      - ${MOODLE_DATAROOT_HOST:-./volumes/moodle-dataroot}:/moodle/dataroot:ro
      # MAMP socket — add /Applications/MAMP in Docker Desktop → File sharing if mount denied
      - ${MAMP_MYSQL_SOCKET_HOST:-/Applications/MAMP/tmp/mysql/mysql.sock}:/var/run/mysqld/mysqld.sock
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: moodle-chatbot-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: moodle-chatbot-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: moodle-chatbot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-smart-knowledge}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      mc mb -p local/$$MINIO_BUCKET 2>/dev/null || true &&
      echo 'MinIO bucket ready:' $$MINIO_BUCKET
      "

  ollama:
    image: ollama/ollama:latest
    container_name: moodle-chatbot-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '3.5'
          memory: 6G
    healthcheck:
      # ollama/ollama image has no curl; use the bundled CLI
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Optional: pull embedding + chat models after Ollama is healthy (first run can take a while).
  ollama-init:
    image: ollama/ollama:latest
    container_name: moodle-chatbot-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3_q4km:latest}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-}
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-init.sh:/ollama-init.sh:ro
    entrypoint: ["/bin/sh", "/ollama-init.sh"]
    profiles:
      - init-models

volumes:
  rag_chroma:
  redis_data:
  minio_data:
  ollama_data:
